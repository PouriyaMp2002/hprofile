name: Hprofile Actions
on: workflow_dispatch
env:
  AWS_REGION: us-east-1

jobs:
  BUILD_PUBLISH:
    runs-on: self-hosted
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Update application.properties file
        run: |
          sed -i "s/^jdbc.username.*$/jdbc.username\=${{ secrets.USERNAME  }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.password.*$/jdbc.password\=${{ secrets.PASSWORD  }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.db01/${{  secrets.ENDPOINT  }}/" src/main/resources/application.properties
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -f ./Dockerfile -t hprofile:${{ github.run_number }} .
          docker tag hprofile:${{ github.run_number }} ${{ secrets.CACHE }}:latest

      - name: Push image
        run: |
          docker push ${{ secrets.CACHE }}:latest