name: Hprofile Actions
on: workflow_dispatch
env:
  AWS_REGION: us-east-1

jobs:
  Testing:
    runs-on: self-hosted
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4 # Use this tool in order to clone.

      - name: Set java 11
        uses: actions/setup-java@v3
        with: 
          distribution: 'temurin'
          java-version: '11'

      - name: Maven Test #import maven to Test and checkstyle. 
        run: mvn test

      - name: Maven Checkstyle
        run: mvn checkstyle:checkstyle

      - name: SonarQube Scan
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.host.url=${{ secrets.SONAR_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.junit.reportsPath=target/surefire-reports \
            -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml

# Use Documentation for Quality Gate in Github Actions. (Maybe you should buy subscription.)
  
  BUILD_PUBLISH:
    needs: Testing
    runs-on: self-hosted
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Update application.properties file
        run: |
          sed -i "s/^jdbc.username.*$/jdbc.username\=${{ secrets.USERNAME  }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.password.*$/jdbc.password\=${{ secrets.PASSWORD  }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.db01/${{  secrets.ENDPOINT  }}/" src/main/resources/application.properties
      
      - name: 'Get Login to AWS ECR'
        id: ecr-login
        uses: thalesvon/ecr-login@master
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_OUTPUT: json
          AWS_REGION: us-east-1
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          args: 'get-login --no-include-email --region ${AWS_REGION}'
      - name: 'Docker Login'
        run: ${{ steps. ecr-login.outputs.login-string }}

      
      - name: upload image to ECR
        uses: appleboy/docker-ecr-action@master
        with:
          access_key: a50d28f4dd477bc184fbd10b376de753
          secret_key: bc5785d3ece6a9cdefa42eb99b58986f9095ff1c
          repo: hprofile
          registry: ${{ secrets.REGISTRY }}